services:
    postgres:
        image: postgres:16-alpine
        container_name: document-flow-postgres-dev
        restart: unless-stopped
        environment:
            POSTGRES_DB: document_flow
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        ports:
            - "5432:5432"
        volumes:
            - document_flow_postgres_dev_data:/var/lib/postgresql/data

volumes:
    document_flow_postgres_dev_data:
